services:

  # ── Main FastAPI Web Service ────────────────────────────────────────────────
  - type: web
    name: knowshift-api
    env: python
    region: oregon
    plan: free
    rootDir: knowshift-backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        sync: false                   # Set manually in dashboard: your existing Redis URL

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: knowshift-worker
    env: python
    region: oregon
    plan: free
    rootDir: knowshift-backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      celery -A app.workers.tasks worker
      --loglevel=info
      --concurrency=1
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false

  # ── Celery Beat Scheduler ──────────────────────────────────────────────────
  - type: worker
    name: knowshift-beat
    env: python
    region: oregon
    plan: free
    rootDir: knowshift-backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      celery -A app.workers.tasks beat
      --loglevel=info
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false

  # NOTE: Redis is NOT defined here — you already have a free-tier Redis
  # instance on your Render account (red-d7lohcl7vvec73eh0k8g).
  # Set REDIS_URL manually in the dashboard for each service above.

